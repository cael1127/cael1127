<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 88" width="1280" height="88" role="img" aria-labelledby="ft">
  <title id="ft">Cael Findley — session footer</title>
  <defs>
    <linearGradient id="fground" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#101612"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="ffade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="30%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="1"/>
    </linearGradient>
    <mask id="ffm" maskUnits="userSpaceOnUse" x="0" y="0" width="1280" height="88">
      <rect width="1280" height="88" fill="url(#ffade)"/>
    </mask>
  </defs>
  <g mask="url(#ffm)">
    <rect width="1280" height="88" fill="url(#fground)"/>
    <rect x="64" y="22" width="1152" height="44" rx="8" fill="#1a3d2a" stroke="#2d4a38" stroke-width="1"/>
    <circle cx="92" cy="44" r="5" fill="#86efac">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="112" y="50" fill="#ecf2ec" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">session complete</text>
    <text x="640" y="50" text-anchor="middle" fill="#7a8a7a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">cael@findley · build with intent</text>
    <text x="1196" y="50" text-anchor="end" fill="#86efac" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">exit 0</text>
  </g>
</svg>
