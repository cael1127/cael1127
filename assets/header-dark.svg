<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 460" width="1280" height="460" role="img" aria-labelledby="title desc">
  <title id="title">Cael Findley — Software Developer</title>
  <desc id="desc">Build-session banner: identity plus a terminal that types whoami, focus, and location (dark)</desc>
  <defs>
    <linearGradient id="wash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#101612"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="4%" stop-color="white" stop-opacity="1"/>
      <stop offset="92%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="blend" maskUnits="userSpaceOnUse" x="0" y="0" width="1280" height="460">
      <rect width="1280" height="460" fill="url(#edge)"/>
    </mask>
    <clipPath id="c1">
      <rect x="742" y="130" width="0" height="26">
        <animate attributeName="width" from="0" to="200" begin="0.5s" dur="0.75s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="c2">
      <rect x="742" y="160" width="0" height="26">
        <animate attributeName="width" from="0" to="260" begin="1.4s" dur="0.85s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="c3">
      <rect x="742" y="200" width="0" height="26">
        <animate attributeName="width" from="0" to="290" begin="2.5s" dur="0.9s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="c4">
      <rect x="742" y="230" width="0" height="26">
        <animate attributeName="width" from="0" to="400" begin="3.6s" dur="1.1s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="c5">
      <rect x="742" y="270" width="0" height="26">
        <animate attributeName="width" from="0" to="140" begin="5.0s" dur="0.65s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="c6">
      <rect x="742" y="300" width="0" height="26">
        <animate attributeName="width" from="0" to="320" begin="5.8s" dur="0.95s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="c7">
      <rect x="742" y="340" width="0" height="26">
        <animate attributeName="width" from="0" to="40" begin="7.0s" dur="0.4s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <g mask="url(#blend)">
    <rect width="1280" height="460" fill="url(#wash)"/>

    <!-- Identity -->
    <rect x="0" y="0" width="10" height="460" fill="#86efac"/>
    <text x="56" y="128" fill="#86efac" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" font-weight="600" letter-spacing="4">SOFTWARE DEVELOPER</text>
    <text x="56" y="220" fill="#ecf2ec" font-family="Georgia, 'Times New Roman', Times, serif" font-size="78" font-weight="400" letter-spacing="-1.5">Cael Findley</text>
    <rect x="56" y="246" width="200" height="4" rx="2" fill="#86efac"/>
    <text x="56" y="296" fill="#a8b5a8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="22">Building AI systems and full-stack products</text>
    <text x="56" y="336" fill="#7a8a7a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" letter-spacing="1.2">Texas A&amp;M CS  ·  @cael1127</text>

    <g transform="translate(56,372)">
      <rect width="168" height="32" rx="16" fill="#1a3d2a" stroke="#a3b18a" stroke-width="1"/>
      <circle cx="18" cy="16" r="5" fill="#86efac">
        <animate attributeName="opacity" values="1;0.35;1" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <text x="34" y="21" fill="#ecf2ec" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" font-weight="600">build session</text>
    </g>

    <!-- Terminal -->
    <rect x="720" y="72" width="500" height="320" rx="12" fill="#0c1210" stroke="#2d4a38" stroke-width="1.5"/>
    <path d="M720,84 a12,12 0 0 1 12,-12 h476 a12,12 0 0 1 12,12 v20 H720 Z" fill="#152019"/>
    <circle cx="744" cy="92" r="5" fill="#ef4444" opacity="0.8"/>
    <circle cx="762" cy="92" r="5" fill="#eab308" opacity="0.8"/>
    <circle cx="780" cy="92" r="5" fill="#22c55e" opacity="0.8"/>
    <text x="970" y="97" text-anchor="middle" fill="#6b7c70" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">cael@findley — zsh</text>

    <text x="754" y="150" fill="#86efac" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" clip-path="url(#c1)">$ whoami</text>
    <text x="754" y="180" fill="#a3b18a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" clip-path="url(#c2)">Cael Findley</text>
    <text x="754" y="220" fill="#86efac" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" clip-path="url(#c3)">$ cat ~/focus.md</text>
    <text x="754" y="250" fill="#a3b18a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" clip-path="url(#c4)">AI systems · full-stack · systems</text>
    <text x="754" y="290" fill="#86efac" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" clip-path="url(#c5)">$ pwd</text>
    <text x="754" y="320" fill="#a3b18a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" clip-path="url(#c6)">~/texas-am/computer-science</text>
    <text x="754" y="360" fill="#86efac" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" clip-path="url(#c7)">$</text>

    <!-- Caret after final $ -->
    <rect x="772" y="346" width="9" height="17" fill="#86efac" opacity="0">
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.95;1" dur="7.5s" fill="freeze"/>
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.48;0.5;1" dur="1.05s" begin="7.5s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
