<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 440" width="1280" height="440" role="img" aria-labelledby="title desc">
  <title id="title">Cael Findley — Software Developer</title>
  <desc id="desc">Static sage/emerald editorial profile banner (light)</desc>
  <defs>
    <linearGradient id="wash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#f5f7f3"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#065f46" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#d8e8d8" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="5%" stop-color="white" stop-opacity="1"/>
      <stop offset="90%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="blend" maskUnits="userSpaceOnUse" x="0" y="0" width="1280" height="440">
      <rect width="1280" height="440" fill="url(#edge)"/>
    </mask>
  </defs>

  <g mask="url(#blend)">
    <rect width="1280" height="440" fill="url(#wash)"/>

    <!-- Left brand column -->
    <rect x="0" y="0" width="14" height="440" fill="#047857"/>
    <rect x="14" y="0" width="220" height="440" fill="url(#panel)"/>

    <!-- Monogram block -->
    <rect x="48" y="150" width="152" height="152" rx="8" fill="#047857" opacity="0.95"/>
    <text x="124" y="252" text-anchor="middle" fill="#ffffff" font-family="Georgia, 'Times New Roman', Times, serif" font-size="72" font-weight="700" letter-spacing="-2">CF</text>

    <!-- Primary type -->
    <text x="300" y="150" fill="#52796f" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" font-weight="600" letter-spacing="5">SOFTWARE DEVELOPER</text>
    <text x="300" y="240" fill="#14201a" font-family="Georgia, 'Times New Roman', Times, serif" font-size="96" font-weight="400" letter-spacing="-2">Cael Findley</text>
    <rect x="300" y="268" width="280" height="5" rx="2" fill="#047857"/>
    <text x="300" y="320" fill="#4a5c50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="26">AI systems · full-stack products · systems</text>
    <text x="300" y="368" fill="#6b7c70" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" letter-spacing="1.5">Texas A&amp;M CS  ·  @cael1127</text>
  </g>
</svg>
